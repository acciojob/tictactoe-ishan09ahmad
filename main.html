<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
	<h1>TIC TAC TOE </h1>
	
	<div class="input" id="inputContainer">
	
		<div>
			<label for="player-1">
				Player 1
			</label>
			<input type="text" id="player-1" name="player-1" placeholder="enter name">
		</div>
		<div>
			<label for="player-2">
				Player 2
			</label>
			<input type="text" id="player-2" name="player-2" placeholder="enter name">
				</div>

<div class="game-container hide" id="game-container" >

			you are up
				</div>
	<div class="board" id=""board>

	</div>
</div>
